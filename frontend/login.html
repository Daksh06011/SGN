<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SGN Controls</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #FF8C00 0%, #FFA500 25%, #4A4A4A 50%, #FF7700 75%, #FF6600 100%);
            background-size: 400% 400%;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: gradientShift 15s ease infinite;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 500px;
            width: 100%;
            padding: 0 15px;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #FF8C00 0%, #FFA500 100%);
            color: white;
            border-radius: 20px 20px 0 0;
            border: none;
            padding: 2rem;
            text-align: center;
        }

        .card-header h3 {
            font-weight: 700;
            letter-spacing: 0.5px;
            margin: 0;
            font-size: 1.5rem;
        }

        .card-body {
            padding: 2rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF8C00 0%, #FFA500 100%);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            width: 100%;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #FFA500 0%, #FF8C00 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.4);
            color: white;
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #E5E5E5;
        }

        .register-link p {
            color: #4A4A4A;
            margin: 0;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .register-link a {
            color: #FF8C00;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .register-link a:hover {
            color: #FFA500;
            text-decoration: underline;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            font-weight: 600;
            color: #4A4A4A;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .form-control {
            border: 1px solid #E5E5E5;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            background-color: #f8f9fa;
            transition: all 0.3s ease;
            height: auto;
        }

        .form-control:focus {
            border-color: #FF8C00;
            box-shadow: 0 0 0 0.2rem rgba(255, 140, 0, 0.25);
            background-color: white;
            color: #4A4A4A;
        }

        .form-control::placeholder {
            color: #808080;
        }

        .alert {
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.1) 0%, rgba(255, 165, 0, 0.05) 100%);
            color: #FF7700;
            border-left: 4px solid #FF8C00;
            margin-bottom: 1.5rem;
        }

        .alert-dismissible .close {
            color: #FF8C00;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo i {
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12">
                <div class="logo">
                    <i class="fas fa-atom"></i> SGN Controls
                </div>
                <div class="card">
                    <div class="card-header">
                        <h3>
                            <i class="fas fa-sign-in-alt"></i> Login to Your Device
                        </h3>
                    </div>
                    <div class="card-body">
                        <div id="errorMsg" class="alert alert-danger" style="display: none; font-size: 0.9rem; padding: 0.75rem;">
                            <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
                        </div>
                        <form id="loginForm">
                            <div class="form-group">
                                <label for="username">
                                    <i class="fas fa-user"></i> Username
                                </label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="username"
                                    name="username"
                                    required>
                            </div>
                            <div class="form-group">
                                <label for="password">
                                    <i class="fas fa-lock"></i> Password
                                </label>
                                <input
                                    type="password"
                                    class="form-control"
                                    id="password"
                                    name="password"
                                    required
                                    placeholder="Enter your password">
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-arrow-right"></i> Login
                            </button>
                        </form>
                        <div class="register-link">
                            <p>Don't have an account? <a href="register.html">Register here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE_URL = 'https://reasonable-wonder-production-c57e.up.railway.app';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            errorMsg.style.display = 'none';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE_URL}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('access_token', data.token);
                    localStorage.setItem('user_data', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    errorText.textContent = data.error || 'Login failed. Please check your credentials.';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorText.textContent = 'Network error. Please try again later.';
                errorMsg.style.display = 'block';
                console.error('Login error:', error);
            }
        });
    </script>
</body>
</html>
