<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
    <div class="container" style="max-width: 500px;">
        <h3 class="mb-4">Change Password</h3>

        <div id="statusMsg" style="display: none;" class="alert"></div>

        <form id="changePasswordForm">
            <div class="mb-3">
                <label for="current_password" class="form-label">Current Password</label>
                <input type="password" class="form-control" name="current_password" required>
            </div>
            <div class="mb-3">
                <label for="new_password" class="form-label">New Password</label>
                <input type="password" class="form-control" name="new_password" required>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" name="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-primary">Update Password</button>
            <a href="dashboard.html" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>

    <script>
            const API_BASE_URL = (typeof window.__BACKEND_URL !== 'undefined')
                ? window.__BACKEND_URL
                : (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? 'http://127.0.0.1:5000' : '');

        if (!localStorage.getItem('access_token')) {
            window.location.href = 'login.html';
        }

        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            const statusMsg = document.getElementById('statusMsg');

            try {
                const response = await fetch(`${API_BASE_URL}/api/change_password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                statusMsg.style.display = 'block';
                if (result.success) {
                    statusMsg.className = 'alert alert-success';
                    statusMsg.textContent = result.message;
                    e.target.reset();
                } else {
                    statusMsg.className = 'alert alert-danger';
                    statusMsg.textContent = result.error || 'Failed to update password';
                }
            } catch (error) {
                statusMsg.style.display = 'block';
                statusMsg.className = 'alert alert-danger';
                statusMsg.textContent = 'Network error. Try again.';
            }
        });
    </script>
</body>
</html>
