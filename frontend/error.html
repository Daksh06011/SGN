<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - SGN Controls</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/css/common.css">
    <style>
        body {
            background: linear-gradient(135deg, #FF8C00 0%, #FFA500 25%, #4A4A4A 50%, #FF7700 75%, #FF6600 100%);
            background-size: 400% 400%;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: gradientShift 15s ease infinite;
            overflow-x: hidden;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            max-width: 550px;
        }
        
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .card-header {
            background: linear-gradient(135deg, #FF7700 0%, #FF6600 100%);
            color: white;
            border-radius: 20px 20px 0 0;
            border: none;
            padding: 2rem;
        }
        
        .card-header h3 {
            font-weight: 700;
            letter-spacing: 0.5px;
            margin: 0;
        }
        
        .card-body {
            padding: 2rem;
        }
        
        .alert {
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.1) 0%, rgba(255, 100, 100, 0.05) 100%);
            color: #FF6B6B;
            border-left: 4px solid #FF7700;
            margin-bottom: 1.5rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #FF8C00 0%, #FFA500 100%);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #FFA500 0%, #FF8C00 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.4);
        }
        
        .error-icon {
            text-align: center;
            margin-bottom: 1rem;
            font-size: 3rem;
            color: #FF7700;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card">
                    <div class="card-header">
                        <h3 class="text-center mb-0">
                            <i class="fas fa-exclamation-triangle"></i> Error
                        </h3>
                    </div>
                    <div class="card-body">
                        <div class="error-icon">
                            <i class="fas fa-exclamation-circle"></i>
                        </div>
                        <div class="alert alert-danger">
                            <strong>Oops!</strong> <span id="errorMessage">An error occurred.</span>
                        </div>
                        <a href="dashboard.html" class="btn btn-primary btn-block">
                            <i class="fas fa-arrow-left"></i> Back to Dashboard
                        </a>
                        <a href="login.html" class="btn btn-outline-secondary btn-block" style="margin-top: 0.5rem; color: #4A4A4A; border-color: #E5E5E5;">
                            <i class="fas fa-sign-in-alt"></i> Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
