<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SGN Controls</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #FF8C00 0%, #FFA500 25%, #4A4A4A 50%, #FF7700 75%, #FF6600 100%);
            background-size: 400% 400%;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: gradientShift 15s ease infinite;
            overflow-x: hidden;
            padding: 2rem 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 500px;
            width: 100%;
            padding: 0 15px;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card-header {
            background: linear-gradient(135deg, #FF8C00 0%, #FFA500 100%);
            color: white;
            border-radius: 20px 20px 0 0;
            border: none;
            padding: 2rem;
        }

        .card-header h3 {
            font-weight: 700;
            letter-spacing: 0.5px;
            margin: 0;
        }

        .card-body {
            padding: 2rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF8C00 0%, #FFA500 100%);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            padding: 0.75rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #FFA500 0%, #FF8C00 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #E5E5E5;
        }

        .login-link p {
            color: #4A4A4A;
            margin: 0;
            font-weight: 500;
        }

        .login-link a {
            color: #FF8C00;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: #FFA500;
            text-decoration: underline;
        }

        .form-group label {
            font-weight: 600;
            color: #4A4A4A;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .form-group small {
            color: #808080;
            font-size: 0.75rem;
            margin-top: 0.35rem;
            display: block;
        }

        .form-control {
            border: 1px solid #E5E5E5;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            background-color: #f8f9fa;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: #FF8C00;
            box-shadow: 0 0 0 0.2rem rgba(255, 140, 0, 0.25);
            background-color: white;
        }

        .form-control::placeholder {
            color: #808080;
        }

        .alert {
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(255, 140, 0, 0.1) 0%, rgba(255, 165, 0, 0.05) 100%);
            color: #FF7700;
            border-left: 4px solid #FF8C00;
        }

        .alert-dismissible .close {
            color: #FF8C00;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo i {
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12">
                <div class="logo">
                    <i class="fas fa-atom"></i> SGN Controls
                </div>
                <div class="card">
                    <div class="card-header">
                        <h3 class="text-center mb-0">
                            <i class="fas fa-user-plus"></i> Create Account
                        </h3>
                    </div>
                    <div class="card-body">
                        {% if error %}
                            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                <i class="fas fa-exclamation-circle"></i> {{ error }}
                                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                                    <span aria-hidden="true">&times;</span>
                                </button>
                            </div>
                        {% endif %}
                        <form method="POST" action="{{ url_for('register') }}">
                            <div class="form-group">
                                <label for="username"><i class="fas fa-user"></i> Username</label>
                                <input type="text" class="form-control" id="username" name="username"
                                    required placeholder="Choose a username" value="{{ request.form.get('username', '') }}">
                                <small>Minimum 3 characters</small>
                            </div>
                            <div class="form-group">
                                <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                                <input type="email" class="form-control" id="email" name="email"
                                    required placeholder="your@email.com" value="{{ request.form.get('email', '') }}">
                            </div>
                            <div class="form-group">
                                <label for="password"><i class="fas fa-lock"></i> Password</label>
                                <input type="password" class="form-control" id="password" name="password"
                                    required placeholder="Enter a password">
                                <small>Minimum 6 characters</small>
                            </div>
                            <div class="form-group">
                                <label for="confirm_password"><i class="fas fa-lock"></i> Confirm Password</label>
                                <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                                    required placeholder="Confirm your password">
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">
                                <i class="fas fa-check-circle"></i> Create Account
                            </button>
                        </form>
                        <div class="login-link">
                            <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
